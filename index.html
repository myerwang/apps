<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myer Wang Apps</title>
  <link rel="stylesheet" href="./shared.css">
</head>
<body>
  <main class="showcase">
    <header class="hero">
      <p class="eyebrow">App Showcase</p>
      <h1>Myer Wang Apps</h1>
      <p class="hero-copy">集中展示已创建的 App，并托管提交商店审核所需的 Privacy Policy、Support、Terms 页面。</p>
    </header>

    <section class="app-grid" aria-label="Apps">
      <article class="app-card">
        <div class="app-top">
          <a class="icon-shell" href="./lazywords/" aria-label="Open LazyWords">
            <img class="app-icon" src="./assets/lazywords-icon.png" width="88" height="88" alt="笨单词 LazyWords app icon">
          </a>
          <div>
            <p class="app-kicker">Pixel RPG Vocabulary</p>
            <h2>笨单词 LazyWords</h2>
            <p class="app-subtitle">把背单词做成一段像素冒险。</p>
          </div>
        </div>

        <p class="app-description">RPG 战斗、角色成长、本地学习进度、英语发音、音效与背景音乐，服务于持续词汇练习。</p>

        <div class="meta-row" aria-label="App highlights">
          <span>iOS / Android</span>
          <span>Local-first</span>
          <span>No ads</span>
          <span>Preparing for launch</span>
        </div>

        <div class="link-row">
          <a class="primary-link" href="./lazywords/">App Page</a>
          <a href="./lazywords/privacy/">Privacy</a>
          <a href="./lazywords/support/">Support</a>
          <a href="./lazywords/terms/">Terms</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
