<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myer Wang Apps</title>
  <link rel="stylesheet" href="./shared.css">
</head>
<body>
  <main class="showcase">
    <header class="hero">
      <p class="eyebrow">App Showcase</p>
      <h1>Myer Wang Apps</h1>
      <p class="hero-copy">集中展示已创建的 App，并托管提交商店审核所需的 Privacy Policy、Support、Terms 页面。</p>
    </header>

    <section class="app-grid" aria-label="Apps">
      <article class="app-card featured">
        <div class="app-visual">
          <img class="app-icon" src="./assets/lazywords-icon.png" alt="笨单词 LazyWords app icon">
          <span class="status-badge">Preparing for launch</span>
        </div>
        <div class="app-content">
          <p class="app-kicker">Pixel RPG Vocabulary</p>
          <h2>笨单词 LazyWords</h2>
          <p>像素风英语单词学习 App。通过战斗、角色成长、本地进度、英语发音、音效与背景音乐，把背单词变成一段轻量冒险。</p>
          <div class="meta-row" aria-label="App highlights">
            <span>iOS / Android</span>
            <span>Local-first</span>
            <span>No ads</span>
          </div>
          <div class="link-row">
            <a class="primary-link" href="./lazywords/">View App</a>
            <a href="./lazywords/privacy/">Privacy</a>
            <a href="./lazywords/support/">Support</a>
            <a href="./lazywords/terms/">Terms</a>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
